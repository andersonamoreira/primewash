networks:
  dec-db-shared:
    external: true

services:
  app:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:?defina DATABASE_URL no arquivo .env}
      AUTH_SECRET: ${AUTH_SECRET:?defina AUTH_SECRET no arquivo .env}
      AUTH_TRUST_HOST: "true"
      UPLOADS_DIR: /app/data/uploads
      GOOGLE_CLIENT_EMAIL: ${GOOGLE_CLIENT_EMAIL:-}
      GOOGLE_PRIVATE_KEY: ${GOOGLE_PRIVATE_KEY:-}
      GOOGLE_CALENDAR_ID: ${GOOGLE_CALENDAR_ID:-primewashmoto@gmail.com}
    ports:
      - "${APP_PORT:-3001}:3000"
    volumes:
      - uploads:/app/data/uploads
    networks:
      - dec-db-shared

volumes:
  uploads:
