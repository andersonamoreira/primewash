services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-primewash}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD no arquivo .env}
      POSTGRES_DB: ${POSTGRES_DB:-primewash}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-primewash}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-primewash}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-primewash}
      AUTH_SECRET: ${AUTH_SECRET:?defina AUTH_SECRET no arquivo .env}
      AUTH_TRUST_HOST: "true"
      UPLOADS_DIR: /app/data/uploads
      GOOGLE_CLIENT_EMAIL: ${GOOGLE_CLIENT_EMAIL:-}
      GOOGLE_PRIVATE_KEY: ${GOOGLE_PRIVATE_KEY:-}
      GOOGLE_CALENDAR_ID: ${GOOGLE_CALENDAR_ID:-primewashmoto@gmail.com}
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - uploads:/app/data/uploads

volumes:
  pgdata:
  uploads:
